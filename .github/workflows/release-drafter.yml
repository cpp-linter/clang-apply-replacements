name: Release Drafter

# When a PR that changes the version file is opened or updated,
# automatically:
#   1. Label the PR as "release"
#   2. Create/update a draft GitHub Release (using PR body as release notes)
#   3. Post/update a single comment with a link to the draft release
#
# After merge:
#   - auto-tag.yml creates the git tag
#   - release.yml builds + publishes, and promotes the draft to a full release

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'clang-apply-replacements_version.txt'

permissions:
  contents: write
  pull-requests: write

jobs:
  draft-release:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'cpp-linter'

    steps:
      - uses: actions/checkout@v6

      - name: Read version from PR branch
        id: version
        run: |
          VERSION=$(cat clang-apply-replacements_version.txt)
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Validate version format
        run: |
          echo "${{ steps.version.outputs.value }}" | grep -qP '^\d+\.\d+\.\d+(\.\d+)?$' || {
            echo "::error::Version '${{ steps.version.outputs.value }}' does not match MAJOR.MINOR.PATCH[.PACKAGING]"
            exit 1
          }

      - name: Add release label to PR
        run: |
          gh pr edit "${{ github.event.pull_request.number }}" --add-label "release"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create or update draft release
        id: release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: v${{ steps.version.outputs.value }}
          body: |
            ${{ github.event.pull_request.body }}

            ---
            > ⚠️ **Draft** — automatically generated from [#${{ github.event.pull_request.number }}](${{ github.event.pull_request.html_url }}).
            > Will be published when the PR is merged.
          draft: true
          make_latest: false

      - name: Update or create PR comment
        uses: actions/github-script@v8
        env:
          VERSION: ${{ steps.version.outputs.value }}
          TAG: ${{ steps.version.outputs.tag }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const version = process.env.VERSION;
            const tag = process.env.TAG;
            const marker = '<!-- release-drafter-bot -->';

            const body = [
              marker,
              '',
              `📦 **Draft release prepared**: [${tag}](https://github.com/${owner}/${repo}/releases/tag/${tag})`,
              '',
              'When this PR is merged:',
              `1. The \`${tag}\` tag is created automatically`,
              '2. Wheels are built and published to PyPI',
              '3. This draft release is promoted to a full release',
            ].join('\n');

            // Find existing bot comment (identified by the HTML marker) and update it,
            // otherwise create a new one.
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }
