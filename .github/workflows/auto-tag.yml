name: Auto Tag on Version Change

# When a commit lands on main that changed the version file, automatically
# create and push the corresponding git tag.  The existing release.yml
# (triggered by tag push) then handles building, testing, and publishing.

on:
  push:
    branches:
      - main
    paths:
      - 'clang-apply-replacements_version.txt'
  # Allow manual trigger as a fallback
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    # Guard: only run on the upstream repo, not on forks
    if: github.repository_owner == 'cpp-linter'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0       # need history to detect version change
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read current version
        id: version
        run: |
          VERSION=$(cat clang-apply-replacements_version.txt)
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if version actually changed
        id: changed
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          # If this tag already exists on this commit, skip
          if git rev-parse -q --verify "refs/tags/${TAG}" > /dev/null 2>&1; then
            echo "Tag ${TAG} already exists — nothing to do."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check whether the version file changed in this push (compared to previous commit on main)
          # Using HEAD~1 is safe because push events always have at least one parent
          if git diff --name-only HEAD~1 HEAD | grep -q 'clang-apply-replacements_version.txt'; then
            echo "Version file changed — will create tag."
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "Version file present but did NOT change in this push — skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.changed.outputs.skip != 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
          echo "✅ Tag ${TAG} created and pushed — release workflow will start automatically."
